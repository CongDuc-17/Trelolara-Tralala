version: '3.8'

services:
    # 1. Phục hồi cấu hình Database theo đúng container đang chạy
    trelolara-database:
        image: postgres:17.2-bookworm
        container_name: trelolara-database
        restart: on-failure
        environment:
            POSTGRES_USER: root
            POSTGRES_PASSWORD: root
            POSTGRES_DB: trelolara
        ports:
            - '5434:5432'

    # 2. Bổ sung thêm Redis có trong ảnh của bạn
    # trelolara-redis:
    #     image: redis:8.4.0-alpine3.22
    #     container_name: trelolara-redis
    #     restart: on-failure
    #     ports:
    #         - '6380:6379'

    # 3. Cập nhật lại Backend
    trelolara-backend:
        working_dir: /app
        container_name: be-trelolara
        build:
            context: .
            dockerfile: Dockerfile
        restart: on-failure
        ports:
            - '3001:3000'
        depends_on:
            - trelolara-database
            # - trelolara-redis
        env_file:
            - .env
        command: ['node', 'dist/app.js']